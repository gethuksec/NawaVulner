# Tanpa root/index — hindari fase file statis yang bisa menempelkan default octet-stream.
server {
    listen 8080;
    server_name _;

    # Satu default jelas di level server (hindari duplikat octet-stream + text/html).
    default_type text/html;
    charset utf-8;

    location = /health {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    location / {
        return 200 '<!DOCTYPE html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NawaVulner Lab (template)</title></head><body style="margin:2rem;font-family:system-ui,Segoe UI,sans-serif;background:#1a1a2e;color:#eee"><h1>Lab pilot</h1><p>Ini halaman template challenge. Ganti dengan aplikasi vulnerable sesuai PRD.</p><p><a style="color:#e94560" href="/health">GET /health</a> (JSON)</p></body></html>';
    }
}

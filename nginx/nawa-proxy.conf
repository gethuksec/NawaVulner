# NawaVulner — reverse proxy (single browser origin)
#
# Penting (Docker): blok `upstream { server nama-host:port }` me-resolve DNS **sekali**
# saat Nginx start. Setelah `docker compose up --build`, container bisa dapat **IP baru**;
# Nginx tetap menghubungi IP lama → `connect() failed (111: Connection refused)` → **502**.
#
# Perbaikan: `resolver 127.0.0.11` (DNS bawaan Docker) + `proxy_pass` memakai **variabel**
# agar hostname di-resolve ulang setiap `valid=` kedaluwarsa (lihat dokumentasi ngx_http_core_module).

server {
    listen 80;
    server_name _;

    # Redirect trailing slash: kalau on + listen 80, Location bisa kehilangan port host (8080) → bug klien.
    absolute_redirect off;

    # DNS internal Docker — jangan ganti kecuali stack Anda memakai resolver lain
    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 2m;

    # API (Express)
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        set $nawa_api_upstream http://nawa-api:3001;
        proxy_pass $nawa_api_upstream;
    }

    # Lab Fase 1 (A01 + A02 + A05) — bundle satu container; header slug untuk routing app
    location ~ ^/lab/(a01-[a-z0-9-]+|a02-[a-z0-9-]+|a05-[a-z0-9-]+)$ {
        return 302 $scheme://$http_host$uri/;
    }

    # Named capture → variabel Nginx stabil (bukan $1 setelah rewrite + proxy_pass variabel).
    location ~ ^/lab/(?P<nawa_lab_slug>a01-[a-z0-9-]+|a02-[a-z0-9-]+|a05-[a-z0-9-]+)/(?P<nawa_lab_tail>.*)$ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Nawa-Lab-Slug $nawa_lab_slug;
        set $challenge_phase1_upstream http://challenge-phase1-bundle:8080;
        rewrite ^ /$nawa_lab_tail break;
        proxy_pass $challenge_phase1_upstream;
    }

    # Lab — slug lain (belum ada container)
    location /lab/ {
        default_type text/plain; charset utf-8;
        return 503 "Lab belum di-deploy untuk slug ini. Lihat docker-compose + nginx/nawa-proxy.conf untuk menambah service.\n";
    }

    # Dashboard (SPA statis)
    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        set $nawa_dashboard_upstream http://nawa-dashboard:80;
        proxy_pass $nawa_dashboard_upstream;
    }
}
